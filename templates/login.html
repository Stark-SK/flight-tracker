<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FlightTrack — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink-900:#070b12;
    --ink-800:#0c1320;
    --panel:#10192a;
    --panel-2:#16223a;
    --panel-3:#1c2b48;
    --hair:#243755;
    --hair-soft:rgba(140,170,220,.08);
    --brass:#e8b860;
    --sky:#5fa8e8;
    --sky-dim:rgba(95,168,232,.14);
    --mint:#3ecf8e;
    --coral:#ef6a5f;
    --coral-dim:rgba(239,106,95,.14);
    --ivory:#f3f1ea;
    --fog:#9fb0cc;
    --fog-dim:#5d6f8f;
    --r-lg:20px;--r-md:13px;--r-sm:9px;
    --display:'Space Grotesk',system-ui,sans-serif;
    --mono:'IBM Plex Mono',ui-monospace,monospace;
    --sans:'Inter',system-ui,sans-serif;
    --ease:cubic-bezier(.16,1,.3,1);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:var(--sans);color:var(--ivory);
    background:
      radial-gradient(900px 500px at 12% -10%,rgba(95,168,232,.08),transparent 60%),
      radial-gradient(700px 460px at 88% 0%,rgba(232,184,96,.06),transparent 55%),
      var(--ink-900);
    min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    -webkit-font-smoothing:antialiased;
  }

  .login-wrap{width:100%;max-width:380px;padding:20px;}

  .brand{display:flex;align-items:center;gap:11px;justify-content:center;margin-bottom:32px;}
  .brand-mark{
    width:40px;height:40px;border-radius:11px;
    background:linear-gradient(150deg,var(--sky),#2c5fa8);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 6px 16px rgba(95,168,232,.3),inset 0 1px 0 rgba(255,255,255,.2);
  }
  .brand-mark svg{width:20px;height:20px;color:#fff;transform:rotate(45deg);}
  .brand-name{font-family:var(--display);font-size:1.2rem;font-weight:700;}
  .brand-name span{color:var(--brass);}

  .card{
    background:linear-gradient(160deg,var(--panel),var(--panel) 60%,var(--panel-2));
    border:1px solid var(--hair);border-radius:var(--r-lg);padding:28px;
    box-shadow:0 1px 0 rgba(255,255,255,.03) inset,0 20px 40px -20px rgba(0,0,0,.6);
  }
  .card-title{font-family:var(--display);font-size:1.15rem;font-weight:700;margin-bottom:4px;}
  .card-sub{font-size:13px;color:var(--fog);margin-bottom:24px;}

  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
  .field label{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--fog-dim);}
  .field input{
    width:100%;padding:12px 13px;
    background:var(--ink-800);border:1px solid var(--hair);color:var(--ivory);
    border-radius:var(--r-sm);font-family:var(--sans);font-size:.9rem;
    transition:border-color .15s var(--ease),box-shadow .15s var(--ease);
  }
  .field input::placeholder{color:var(--fog-dim);}
  .field input:focus{outline:none;border-color:var(--sky);box-shadow:0 0 0 3px var(--sky-dim);}

  .error-box{
    background:var(--coral-dim);border:1px solid var(--coral);border-radius:var(--r-sm);
    padding:10px 13px;font-size:13px;color:var(--coral);margin-bottom:16px;
  }

  .btn{
    width:100%;padding:13px;border:none;border-radius:var(--r-sm);cursor:pointer;
    font-family:var(--sans);font-weight:700;font-size:.9rem;
    background:linear-gradient(135deg,var(--sky),#2c5fa8);color:#fff;
    box-shadow:0 8px 20px rgba(95,168,232,.28),inset 0 1px 0 rgba(255,255,255,.18);
    transition:filter .15s var(--ease),transform .1s var(--ease);margin-top:6px;
  }
  .btn:hover{filter:brightness(1.08);}
  .btn:active{transform:translateY(1px);}

  .footer-note{text-align:center;font-size:11.5px;color:var(--fog-dim);margin-top:20px;}
</style>
</head>
<body>

<div class="login-wrap">
  <div class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 16.5v-1.6L13.5 9V4a1.5 1.5 0 0 0-3 0v5L2 14.9v1.6l8.5-2.6V18l-2.4 1.8v1.4l3.9-1 3.9 1v-1.4L13.5 18v-4.1l8.5 2.6Z"/></svg>
    </div>
    <div class="brand-name">Flight<span>Track</span></div>
  </div>

  <div class="card">
    <div class="card-title">Sign in</div>
    <div class="card-sub">Enter your credentials to continue.</div>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="admin" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn">Sign in</button>
    </form>
  </div>

  <div class="footer-note">FlightTrack &mdash; Live flight search</div>
</div>

</body>
</html>
